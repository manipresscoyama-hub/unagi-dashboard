<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>鰻の成瀬 小岩店</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',sans-serif;
  background:#0f172a;color:#e2e8f0;min-height:100vh;padding:12px}

/* ─ ヘッダー ─ */
.hdr{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:14px;gap:10px;flex-wrap:wrap}
.hdr h1{font-size:22px;font-weight:700;color:#f8fafc}
.hdr .sub{font-size:12px;color:#94a3b8;letter-spacing:2px}
.upbtn{cursor:pointer;padding:8px 14px;border-radius:8px;font-size:12px;
  border:2px dashed #334155;background:transparent;color:#64748b;
  font-family:inherit;white-space:nowrap;transition:all .2s}
.upbtn:hover{border-color:#38bdf8;color:#38bdf8}

/* ─ ナビ ─ */
.nav{display:flex;border-radius:12px;overflow:hidden;border:1px solid #1e293b;
  margin-bottom:14px;background:#1e293b}
.nav-btn{flex:1;cursor:pointer;padding:12px 4px;font-size:15px;border:none;
  font-family:inherit;transition:all .2s;text-align:center;line-height:1.3}
.nav-btn.act{background:#38bdf8;color:#0f172a;font-weight:700}
.nav-btn:not(.act){background:transparent;color:#64748b}

/* ─ タブ ─ */
.tab-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.tab-lbl{font-size:12px;color:#475569;min-width:18px}
.tab{cursor:pointer;padding:6px 12px;border-radius:6px;font-size:13px;
  border:1px solid #334155;background:transparent;color:#64748b;
  transition:all .2s;font-family:inherit;white-space:nowrap}
.tab:hover{background:#1e293b;color:#e2e8f0}
.tab.act{background:#0284c7;color:#fff;border-color:#0284c7}
.ctab-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}

/* ─ KPI ─ */
.kpi-grid{display:grid;gap:10px;margin-bottom:12px;grid-template-columns:1fr 1fr}
.kpi{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px}
.kpi.labor{border-color:#7c3aed;background:#1a1035}
.kpi-lbl{font-size:12px;color:#94a3b8;letter-spacing:.5px;margin-bottom:4px}
.kpi.labor .kpi-lbl{color:#a78bca}
.kpi-val{font-size:22px;font-weight:700;color:#f8fafc;line-height:1.2}
.kpi-sub{font-size:12px;color:#64748b;margin-top:3px}

/* ─ カード ─ */
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;
  padding:14px;margin-bottom:12px}
.card-ttl{font-size:13px;color:#94a3b8;margin-bottom:10px;font-weight:600}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}

/* ─ テーブル ─ */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 8px;color:#94a3b8;font-weight:600;text-align:left;
  white-space:nowrap;border-bottom:1px solid #334155;font-size:12px;
  background:#0f172a}
td{padding:8px 8px;border-bottom:1px solid #1e293b;white-space:nowrap;font-size:13px}
tr:hover td{background:rgba(56,189,248,.04)}
.td-g{color:#38bdf8;font-weight:600}
.td-m{color:#64748b}
.td-r{color:#e2e8f0}

/* ─ バッジ ─ */
.bdg{display:inline-block;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600}
.bdg-up{background:#064e3b;color:#34d399;border:1px solid #065f46}
.bdg-mid{background:#431407;color:#fb923c;border:1px solid #7c2d12}
.bdg-dn{background:#450a0a;color:#f87171;border:1px solid #7f1d1d}
.lbdg{display:inline-block;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:700}
.lbdg-ex{background:#0c4a6e;color:#38bdf8;border:1px solid #0369a1}
.lbdg-ok{background:#064e3b;color:#34d399;border:1px solid #065f46}
.lbdg-warn{background:#451a03;color:#fb923c;border:1px solid #7c2d12}
.lbdg-ng{background:#450a0a;color:#f87171;border:1px solid #7f1d1d}

/* ─ Canvas ─ */
canvas{display:block;width:100%;height:200px}

/* ─ 着地予想 ─ */
.proj-row{display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid #1e293b;padding:8px 0}
.proj-lbl{font-size:11px;color:#64748b}
.proj-val{font-size:13px;color:#e2e8f0}
.proj-val.big{font-size:19px;font-weight:700;color:#34d399}

/* ─ 人件費カード ─ */
.lb-card{background:#1a1035;border:1px solid #7c3aed;
  border-radius:12px;padding:14px;margin-bottom:12px}
.lb-ttl{font-size:11px;color:#a78bca;margin-bottom:12px}
.lb-inp{background:#0f0820;border:1px solid #7c3aed;border-radius:8px;
  color:#e2d4f5;font-size:18px;font-family:inherit;padding:10px 14px;
  width:100%;text-align:right}
.lb-inp:focus{outline:none;border-color:#a78bca}
.lb-save{cursor:pointer;padding:12px;border-radius:8px;font-size:14px;
  border:1px solid #7c3aed;background:#2d1060;color:#e2d4f5;
  font-family:inherit;font-weight:700;width:100%;margin-top:8px}
.lb-saved{font-size:11px;color:#34d399;text-align:center;
  margin-top:6px;opacity:0;transition:opacity .5s;height:16px}
.lb-saved.show{opacity:1}
.lb-rate-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.lb-rate-item{background:rgba(20,12,30,.7);border:1px solid #4a2a7a;
  border-radius:8px;padding:10px}
.lb-rate-lbl{font-size:10px;color:#a78bca;margin-bottom:4px}
.lb-rate-val{font-size:17px;font-weight:700}
.lb-rate-sub{font-size:10px;color:#5a3a7a;margin-top:2px}

/* ─ データ管理 ─ */
.dm-card{background:#1e293b;border:1px solid #334155;
  border-radius:12px;padding:14px;margin-bottom:12px}
.dm-row{padding:12px 0;border-bottom:1px solid #1e293b}
.dm-row:last-child{border-bottom:none}
.dm-month{font-size:15px;font-weight:700;color:#38bdf8;margin-bottom:6px}
.dm-stats{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.dm-stat{font-size:11px;color:#64748b}
.dm-stat span{color:#e2e8f0;font-weight:600}
.btn-del{cursor:pointer;padding:8px;border-radius:6px;font-size:12px;
  border:1px solid #7f1d1d;background:#450a0a;color:#f87171;
  font-family:inherit;width:100%}

/* ─ フッター ─ */
.footer{margin-top:12px;text-align:right;font-size:10px;color:#334155}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}

/* ─ レスポンシブ ─ */
canvas{height:180px}
.g2{grid-template-columns:1fr}

@media(min-width:600px){
  body{padding:16px}
  canvas{height:220px}
  .g2{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-val{font-size:18px}
}

/* PC */
@media(min-width:900px){
  body{padding:20px;max-width:1100px;margin:0 auto}
  canvas{height:240px}
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .kpi-grid.col5{grid-template-columns:repeat(5,1fr)}
  .kpi-val{font-size:19px}
  .nav-btn{font-size:13px;padding:10px 20px}
  .tab{font-size:12px;padding:7px 14px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// Polyfill for older Safari
if(!Array.prototype.find){Array.prototype.find=function(fn){for(var i=0;i<this.length;i++){if(fn(this[i],i,this))return this[i];}return undefined;};}
if(!Array.prototype.findIndex){Array.prototype.findIndex=function(fn){for(var i=0;i<this.length;i++){if(fn(this[i],i,this))return i;}return -1;};}
// ══ ユーティリティ ══════════════════════════════════
function parseCSVRows(text){
  var lines=text.split('\n');
  var headers=lines[0].split('\t').map(function(h){return h.replace(/"/g,'').trim();});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var line=lines[i].trim();
    if(!line)continue;
    var cols=line.split('\t').map(function(c){return c.replace(/"/g,'').trim();});
    var obj={};
    headers.forEach(function(h,j){obj[h]=cols[j]||'';});
    rows.push(obj);
  }
  return rows;
}
function pn(s){if(!s)return 0;return parseInt((s+'').replace(/,/g,'').replace(/[^0-9\-]/g,''))||0;}
function pp(s){if(!s||s==='\u2010'||s==='-')return null;return parseFloat((s+'').replace('%',''))||null;}
function yen(n){return '\u00a5'+Math.round(n).toLocaleString('ja-JP');}
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(0)+'K';return Math.round(n).toLocaleString();}
function yoyColor(v){return v==null?'#888':v>=100?'#4ade80':v>=80?'#facc15':'#f87171';}
function rateLabel(v){return v==null?'':v<=25?'優秀':v<=30?'普通':v<=35?'注意':'危険';}
function rateColor(v){return v==null?'#a78bca':v<=25?'#60a5fa':v<=30?'#86efac':v<=35?'#facc15':'#f87171';}
var MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var WD=['日','月','火','水','木','金','土'];
var WE={'快晴':'☀️','晴れ':'🌤','曇り':'☁️','雨':'🌧','雪':'❄️','にわか雨':'🌦'};

// ══ CSV パース ════════════════════════════════════
function processCSV(csvText){
  var rows=parseCSVRows(csvText);
  var map={};var lastKey=null;
  rows.forEach(function(r){
    var d=r['当年日付'];
    if(!d||d==='TOTAL')return;
    if(d.slice(0,2)==='MD'){
      if(!lastKey||!map[lastKey])return;
      map[lastKey].weekly.push({week:d,
        sales:pn(r['当年実績']),prevSales:pn(r['前年実績']),
        customers:pn(r['当年客数']),yoy:pp(r['前年差異'])});
      return;
    }
    if(d.length===8){
      var yr=parseInt(d.slice(0,4)),mo=parseInt(d.slice(4,6)),dy=parseInt(d.slice(6,8));
      var key=yr+'-'+(mo<10?'0':'')+mo;
      if(!map[key])map[key]={year:yr,month:mo,daily:[],weekly:[]};
      lastKey=key;
      map[key].daily.push({
        date:mo+'/'+dy,year:yr,month:mo,day:dy,
        weekday:r['曜日'],weather:r['当年天気'],
        sales:pn(r['当年実績']),prevSales:pn(r['前年実績']),
        customers:pn(r['当年客数']),prevCustomers:pn(r['前年客数']),
        perCustomer:pn(r['当年客単']),yoy:pp(r['前年差異'])
      });
    }
  });
  return Object.keys(map).sort().map(function(k){var o={key:k};var m=map[k];Object.keys(m).forEach(function(p){o[p]=m[p];});return o;});
}

// ══ ストレージ ════════════════════════════════════
var SKEY='unagi_v70',LKEY='unagi_labor_v3';
function saveData(){
  try{localStorage.setItem(SKEY,JSON.stringify(state.allData.map(function(m){
    return{key:m.key,year:m.year,month:m.month,daily:m.daily,weekly:m.weekly};
  })));}catch(e){}
}
function loadData(){try{var r=localStorage.getItem(SKEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function saveLabor(){try{localStorage.setItem(LKEY,JSON.stringify(state.laborData));}catch(e){}}
function loadLabor(){try{var r=localStorage.getItem(LKEY);return r?JSON.parse(r):{};}catch(e){return{};}}
function getLabor(key){return state.laborData[key]||0;}
function getLaborRate(key){
  var labor=getLabor(key);if(!labor)return null;
  var md=state.allData.find(function(d){return d.key===key;});if(!md)return null;
  var sales=md.daily.reduce(function(s,d){return s+d.sales;},0);
  return sales>0?labor/sales*100:null;
}
function deleteMonth(key){
  state.allData=state.allData.filter(function(d){return d.key!==key;});
  saveData();
  if(state.allData.length){var l=state.allData[state.allData.length-1];state.selYear=getFiscalYear(l.key);state.selKey=null;}
  render();
}

// ══ 計算 ══════════════════════════════════════════
function getMonthlySummary(md){
  if(!md)return null;
  var daily=md.daily;
  var ts=daily.reduce(function(s,d){return s+d.sales;},0);
  var tc=daily.reduce(function(s,d){return s+d.customers;},0);
  var apc=tc>0?Math.round(ts/tc):0;
  var m=md.month,mdays=m===2?28:[4,6,9,11].indexOf(m)>=0?30:31;
  var open=daily.filter(function(d){return d.sales>0;});
  var avgD=open.length>0?ts/open.length:0;
  var proj=avgD*mdays;
  // 前年比：state.allDataから前年同月を参照（CSVの前年列は曜日ズレのため使用しない）
  var prevKey=(md.year-1)+'-'+(md.month<10?'0':'')+md.month;
  var prevMd=state.allData.find(function(d){return d.key===prevKey;});
  var tps=prevMd?prevMd.daily.reduce(function(s,d){return s+d.sales;},0):0;
  var yoy=(md.key<='2024-10'||!prevMd||tps===0)?null:ts/tps*100;
  return{totalSales:ts,totalPrevSales:tps,totalCustomers:tc,avgPerCustomer:apc,
    daysInMonth:daily.length,monthDays:mdays,openDays:open.length,
    avgDaily:avgD,projected:proj,yoy:yoy};
}
function getAnnualData(year){
  var yd=state.allData.filter(function(d){return d.year===year;});
  var yd2=state.allData;  // 前年参照用
  return MN.map(function(name,i){
    var m=i+1,md=yd.find(function(d){return d.month===m;});
    if(!md)return{month:name,sales:0,prevSales:0,customers:0,yoy:null,hasData:false,key:null};
    var s=md.daily.reduce(function(a,d){return a+d.sales;},0);
    var ps=md.daily.reduce(function(a,d){return a+d.prevSales;},0);
    var c=md.daily.reduce(function(a,d){return a+d.customers;},0);
    var prevKey2=(md.year-1)+'-'+(md.month<10?'0':'')+md.month;
    var prevMd2=yd2.find(function(d){return d.key===prevKey2;});
    var ps2=prevMd2?prevMd2.daily.reduce(function(a,d){return a+d.sales;},0):0;
    var yoyVal=(md.key<='2024-10'||!prevMd2||ps2===0)?null:s/ps2*100;
    return{month:name,sales:s,prevSales:ps2,customers:c,yoy:yoyVal,hasData:true,key:md.key};
  });
}
function getAnnualSummary(ad){
  var filled=ad.filter(function(d){return d.hasData;});
  if(!filled.length)return null;
  var ts=filled.reduce(function(s,d){return s+d.sales;},0);
  var tps=filled.reduce(function(s,d){return s+(d.prevSales||0);},0);
  var tc=filled.reduce(function(s,d){return s+d.customers;},0);
  var avg=ts/filled.length;
  return{totalSales:ts,totalPrevSales:tps,totalCustomers:tc,
    monthsWithData:filled.length,avgMonthly:avg,projected:avg*12,
    yoy:tps>0?ts/tps*100:null};
}

// ══ 年度ユーティリティ（4月〜3月）══════════════════
// 月→年度を返す（4〜3月）例: 2025-04→2025, 2026-03→2025
function getFiscalYear(key){
  var yr=parseInt(key.slice(0,4)),mo=parseInt(key.slice(5,7));
  return mo>=4?yr:yr-1;
}
// 年度に属するキー一覧を返す
function getFiscalMonths(fy){
  var keys=[];
  for(var m=4;m<=12;m++) keys.push(fy+'-'+(m<10?'0':'')+m);
  for(var m=1;m<=3;m++) keys.push((fy+1)+'-'+(m<10?'0':'')+m);
  return keys;
}
// 全年度一覧を返す
function getAllFiscalYears(){
  var fys={};
  state.allData.forEach(function(d){ fys[getFiscalYear(d.key)]=1; });
  return Object.keys(fys).map(Number).sort(function(a,b){return a-b;});
}
// 年度表示文字列
function fyLabel(fy){ return fy+'年度'; }
// ══ DOM ヘルパー ══════════════════════════════════
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='class')e.className=attrs[k];
    else if(k.slice(0,2)==='on')e[k]=attrs[k];
    else if(k==='width'||k==='height')e[k]=parseInt(attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(children)children.forEach(function(c){
    if(c==null)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function mkbdg(v){
  if(v==null)return document.createTextNode('—');
  return el('span',{'class':v>=100?'bdg bdg-up':v>=80?'bdg bdg-mid':'bdg bdg-dn'},[v.toFixed(1)+'%']);
}
function mklbdg(v){
  if(v==null)return document.createTextNode('—');
  var cls=v<=25?'lbdg lbdg-ex':v<=30?'lbdg lbdg-ok':v<=35?'lbdg lbdg-warn':'lbdg lbdg-ng';
  return el('span',{'class':cls},[v.toFixed(1)+'%']);
}

// ══ Canvas グラフ ══════════════════════════════════
function drawBar(cv,data,opts){
  var W=cv.width,H=cv.height,ctx=cv.getContext('2d');
  if(!W||!H)return;
  var pad={t:14,r:10,b:34,l:56};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  var maxV=Math.max.apply(null,data.map(function(d){return Math.max(d.v1||0,d.v2||0);}));
  if(!maxV)maxV=1;
  var bgW=cW/data.length;
  var bw=opts.colorFn?bgW*.55:bgW*.28,gap=bgW*.04;
  for(var gi=0;gi<=4;gi++){
    var gy=pad.t+cH-cH/4*gi;
    ctx.strokeStyle='#2a1e08';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+cW,gy);ctx.stroke();
    ctx.fillStyle='#8B6914';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(fmt(maxV/4*gi),pad.l-3,gy+3);
  }
  if(opts.ref100){
    var ry=pad.t+cH-(100/maxV)*cH;
    ctx.strokeStyle='rgba(212,168,67,.6)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(pad.l,ry);ctx.lineTo(pad.l+cW,ry);ctx.stroke();
    ctx.setLineDash([]);
  }
  data.forEach(function(d,i){
    var cx=pad.l+bgW*i+bgW/2;
    if(opts.colorFn){
      var bh=Math.max((d.v1||0)/maxV*cH,1);
      ctx.fillStyle=opts.colorFn(d.v1);ctx.fillRect(cx-bw/2,pad.t+cH-bh,bw,bh);
    } else {
      var bh1=Math.max((d.v1||0)/maxV*cH,1);
      ctx.fillStyle='#d4a843';ctx.fillRect(cx-bw-gap,pad.t+cH-bh1,bw,bh1);
      if(d.v2!=null){var bh2=Math.max(d.v2/maxV*cH,1);ctx.fillStyle='#4a3510';ctx.fillRect(cx+gap,pad.t+cH-bh2,bw,bh2);}
    }
    ctx.fillStyle='#8B6914';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.label,cx,pad.t+cH+14);
  });
}
function drawLine(cv,data){
  var W=cv.width,H=cv.height,ctx=cv.getContext('2d');
  if(!W||!H)return;
  var pad={t:14,r:10,b:34,l:56};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  var maxV=Math.max.apply(null,data.map(function(d){return Math.max(d.v1||0,d.v2||0);}));
  if(!maxV)maxV=1;
  var xs=cW/(data.length>1?data.length-1:1);
  for(var gi=0;gi<=4;gi++){
    var gy=pad.t+cH-cH/4*gi;
    ctx.strokeStyle='#2a1e08';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+cW,gy);ctx.stroke();
    ctx.fillStyle='#8B6914';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(fmt(maxV/4*gi),pad.l-3,gy+3);
  }
  ['v2','v1'].forEach(function(key){
    ctx.strokeStyle=key==='v1'?'#d4a843':'#4a3510';
    ctx.lineWidth=key==='v1'?2:1.5;
    ctx.setLineDash(key==='v2'?[4,3]:[]);
    ctx.beginPath();var first=true;
    data.forEach(function(d,i){
      var v=d[key];if(v==null||v===0&&key==='v2')return;
      var x=pad.l+xs*i,y=pad.t+cH-(v/maxV)*cH;
      if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
    });
    ctx.stroke();
  });
  ctx.setLineDash([]);

// カスタム棒グラフ（当年：青・前年：暗青）
function drawBarCustom(cv,data){
  var W=cv.width,H=cv.height,ctx=cv.getContext('2d');
  if(!W||!H)return;
  var pad={t:20,r:10,b:36,l:58};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  var maxV=Math.max.apply(null,data.map(function(d){return Math.max(d.v1||0,d.v2||0);}));
  if(!maxV)maxV=1;
  // グリッド
  for(var gi=0;gi<=4;gi++){
    var gy=pad.t+cH*(1-gi/4);
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+cW,gy);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(fmtM(maxV*gi/4),pad.l-4,gy+3);
  }
  var bgW=cW/data.length;
  var bw=bgW*.28,gap=bgW*.03;
  data.forEach(function(d,i){
    var cx=pad.l+bgW*i+bgW/2;
    if(d.v2!=null&&d.v2>0){
      var bh2=Math.max(d.v2/maxV*cH,1);
      ctx.fillStyle='#64748b';
      ctx.fillRect(cx-bw-gap,pad.t+cH-bh2,bw,bh2);
    }
    if(d.v1!=null&&d.v1>0){
      var bh1=Math.max(d.v1/maxV*cH,1);
      ctx.fillStyle='#f97316';
      ctx.fillRect(cx+gap,pad.t+cH-bh1,bw,bh1);
    }
    ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.label,cx,pad.t+cH+14);
  });
}

// カスタム折れ線グラフ
function drawLineCustom(cv,data,opts){
  var W=cv.width,H=cv.height,ctx=cv.getContext('2d');
  if(!W||!H||!data.length)return;
  var pad={t:20,r:14,b:36,l:48};
  var cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
  ctx.clearRect(0,0,W,H);
  var vals=data.map(function(d){return d.v1||0;});
  var maxV=Math.max.apply(null,vals)||1;
  var minV=opts.ref100?0:Math.max(0,Math.min.apply(null,vals)-maxV*.1);
  var range=maxV-minV||1;
  // グリッド
  for(var gi=0;gi<=4;gi++){
    var gy=pad.t+cH*(1-gi/4);
    var gv=minV+range*gi/4;
    ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+cW,gy);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(opts.ref100||opts.ref35?Math.round(gv)+'%':fmtM(gv),pad.l-4,gy+3);
  }
  // 基準ライン
  if(opts.ref100&&maxV>=100){
    var ry=pad.t+cH*(1-(100-minV)/range);
    ctx.strokeStyle='rgba(212,168,67,.5)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(pad.l,ry);ctx.lineTo(pad.l+cW,ry);ctx.stroke();
    ctx.setLineDash([]);
  }
  if(opts.ref35){
    [25,30,35].forEach(function(v,vi){
      if(v>=minV&&v<=maxV){
        var ry2=pad.t+cH*(1-(v-minV)/range);
        ctx.strokeStyle=['rgba(56,189,248,.4)','rgba(52,211,153,.4)','rgba(251,146,60,.4)'][vi];
        ctx.lineWidth=1;ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(pad.l,ry2);ctx.lineTo(pad.l+cW,ry2);ctx.stroke();
        ctx.setLineDash([]);
      }
    });
  }
  // 折れ線
  var xs=cW/(data.length>1?data.length-1:1);
  // グラデーション塗りつぶし
  var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+cH);
  var gc=opts.color||'#38bdf8';
  var gr=parseInt(gc.slice(1,3),16),gg=parseInt(gc.slice(3,5),16),gb=parseInt(gc.slice(5,7),16);
  grad.addColorStop(0,'rgba('+gr+','+gg+','+gb+',.2)');
  grad.addColorStop(1,'rgba('+gr+','+gg+','+gb+',0)');
  ctx.beginPath();
  data.forEach(function(d,i){
    var x=pad.l+xs*i,y=pad.t+cH*(1-(d.v1-minV)/range);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pad.l+xs*(data.length-1),pad.t+cH);
  ctx.lineTo(pad.l,pad.t+cH);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  // 線
  ctx.strokeStyle=opts.color||'#38bdf8';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();
  data.forEach(function(d,i){
    var x=pad.l+xs*i,y=pad.t+cH*(1-(d.v1-minV)/range);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // 点
  data.forEach(function(d,i){
    var x=pad.l+xs*i,y=pad.t+cH*(1-(d.v1-minV)/range);
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle=opts.color||'#38bdf8';ctx.fill();
  });
  // ラベル
  var step=Math.ceil(data.length/8);
  data.forEach(function(d,i){
    if(i%step!==0&&i!==data.length-1)return;
    ctx.fillStyle='#475569';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(d.label,pad.l+xs*i,pad.t+cH+14);
  });
}

function fmtM(v){
  if(v>=1000000)return (v/1000000).toFixed(1)+'M';
  if(v>=1000)return Math.round(v/1000)+'K';
  return Math.round(v)+'';
}

    var detailWrap=el('div',{style:'display:'+(isExpanded?'block':'none')});
    // 閉じるボタン（詳細の下に設置）
    var closeBtn=el('button',{style:'background:#0f172a;border:1px solid #334155;border-radius:8px;'+
      'color:#64748b;font-size:12px;padding:6px 16px;cursor:pointer;font-family:inherit;'+
      'display:block;width:100%;text-align:center;margin-top:10px'});
    closeBtn.textContent='▲ 閉じる';

    function syncBtns(expanded, btn, cb){
      if(expanded){
        btn.textContent='▲ 閉じる';
        cb.style.display='block';
      } else {
        btn.textContent='▼ 月別詳細';
        cb.style.display='none';
      }
    }
    syncBtns(isExpanded, toggleBtn, closeBtn);

    toggleBtn.onclick=(function(y,dw,btn,cb){
      return function(){
        expandedYears[y]=!expandedYears[y];
        dw.style.display=expandedYears[y]?'block':'none';
        if(!expandedYears[y]){ state.selKey=null; render(); return; }
        syncBtns(expandedYears[y],btn,cb);
      };
    })(fy,detailWrap,toggleBtn,closeBtn);

    closeBtn.onclick=(function(y,dw,btn,cb){
      return function(){
        expandedYears[y]=false;
        state.selKey=null;
        render();
      };
    })(fy,detailWrap,toggleBtn,closeBtn);

    yrHd.appendChild(toggleBtn);
    sec.appendChild(yrHd);

    // ── 月別テーブル（折りたたみ・4月〜3月順）
    detailWrap.appendChild(el('div',{style:'height:1px;background:#334155;margin-bottom:10px'}));
    var tw=el('div',{class:'tbl-wrap'});
    var tbl=el('table',{class:'tbl'});
    var thead=el('thead');
    var hrw=el('tr');
    ['月','売上','前年比','人件費','人件費率','客数'].forEach(function(h){hrw.appendChild(el('th',{},[h]));});
    thead.appendChild(hrw);tbl.appendChild(thead);
    var tbody=el('tbody');

    mds.forEach(function(md){
      var ts=md.daily.reduce(function(s,d){return s+d.sales;},0);
      var tc=md.daily.reduce(function(s,d){return s+d.customers;},0);
      var labor=getLabor(md.key);
      var lr=getLaborRate(md.key);
      // 前年同月（前年度の同じ月）
      var prevKey=(md.year-1)+'-'+(md.month<10?'0':'')+md.month;
      var prevMd=state.allData.find(function(d){return d.key===prevKey;});
      var ps=prevMd?prevMd.daily.reduce(function(s,d){return s+d.sales;},0):0;
      var yoy=(!prevMd||ps===0)?null:ts/ps*100;

      var isSelMonth=(state.selKey===md.key);
      var tr=el('tr',{style:'cursor:pointer;'+(isSelMonth?'background:rgba(56,189,248,.1);':'')});
      tr.onmouseover=function(){if(!isSelMonth)this.style.background='rgba(56,189,248,.05)';};
      tr.onmouseout=function(){if(!isSelMonth)this.style.background='';};
      tr.onclick=(function(key){return function(){
        state.selKey=(state.selKey===key)?null:key;
        render();
      };})(md.key);
      var tdM=el('td',{style:'font-weight:700;color:#38bdf8;white-space:nowrap'});
      tdM.appendChild(document.createTextNode(md.month+'月'));
      tdM.appendChild(el('span',{style:'font-size:10px;color:#475569;margin-left:4px'},[isSelMonth?'▲':'▼']));
      var tdS=el('td',{class:'td-r',style:'font-weight:700'},[yen(ts)]);
      var yoyTd=el('td',{class:'td-r'});
      if(yoy!=null){var bdg=el('span',{class:'bdg',style:'background:'+yoyColor(yoy)+'22;color:'+yoyColor(yoy)+';border:1px solid '+yoyColor(yoy)+'55'},[yoy.toFixed(1)+'%']);yoyTd.appendChild(bdg);}
      else{yoyTd.appendChild(document.createTextNode('—'));}
      var tdL=el('td',{class:'td-r'},[labor>0?yen(labor):'—']);
      var tdLr=el('td',{class:'td-r'});
      tdLr.appendChild(document.createTextNode(lr!=null?lr.toFixed(1)+'%':'—'));
      var tdC=el('td',{class:'td-r'},[tc>0?tc+'名':'—']);
      [tdM,tdS,yoyTd,tdL,tdLr,tdC].forEach(function(td){tr.appendChild(td);});
      tbody.appendChild(tr);

      // 選択中の月は直下に日次テーブルを展開
      if(isSelMonth){
        var dtr=el('tr');
        var dtd=el('td',{colspan:'6',style:'padding:0;background:#f0f9ff'});
        var dtbl=el('table',{style:'width:100%;border-collapse:collapse;font-size:12px'});
        dtbl.appendChild(el('thead',{},[el('tr',{style:'background:#e0f2fe'},[
          '日付','曜','天気','売上','前年','前年比'
        ].map(function(h){return el('th',{style:'padding:6px 8px;color:#0369a1;font-size:11px;text-align:left;border-bottom:1px solid #bae6fd'},[h]);}))]));
        var dtb=el('tbody');
        md.daily.forEach(function(d){
          var drow=el('tr');
          [el('td',{style:'padding:6px 8px;color:#0284c7;font-weight:600'},[d.date]),
           el('td',{style:'padding:6px 8px;color:'+(d.weekday==='日'||d.weekday==='土'?'#dc2626':'#64748b')},[d.weekday]),
           el('td',{style:'padding:6px 8px'},[WE[d.weather]||d.weather||'']),
           el('td',{style:'padding:6px 8px;font-weight:600;color:#1e293b'},[yen(d.sales)]),
           el('td',{style:'padding:6px 8px;color:#94a3b8'},[yen(d.prevSales)]),
           el('td',{style:'padding:6px 8px'},[d.yoy!=null?mkbdg(d.yoy):document.createTextNode('')]),
          ].forEach(function(td){drow.appendChild(td);});
          dtb.appendChild(drow);
        });
        dtbl.appendChild(dtb);dtd.appendChild(dtbl);dtr.appendChild(dtd);
        tbody.appendChild(dtr);
        // 日次明細の閉じるボタン行
        var closeDtr=el('tr');
        var closeDtd=el('td',{colspan:'6',style:'padding:6px 8px;background:#e0f2fe;text-align:center'});
        var closeDayBtn=el('button',{style:'background:#0f172a;border:1px solid #334155;border-radius:8px;'+
          'color:#64748b;font-size:12px;padding:6px 16px;cursor:pointer;font-family:inherit;width:100%'});
        closeDayBtn.textContent='▲ 閉じる';
        closeDayBtn.onclick=(function(k){return function(){state.selKey=null;render();};})(md.key);
        closeDtd.appendChild(closeDayBtn);closeDtr.appendChild(closeDtd);
        tbody.appendChild(closeDtr);
      }
    });

    // 合計行
    var totalRow=el('tr',{style:'border-top:2px solid #334155;background:rgba(56,189,248,.04)'});
    [
      el('td',{style:'font-weight:700;color:#38bdf8'},['合計']),
      el('td',{class:'td-r',style:'font-weight:700'},[yen(yrSales)]),
      el('td',{class:'td-r'},['—']),
      el('td',{class:'td-r'},[yrLabor>0?yen(yrLabor):'—']),
      el('td',{class:'td-r'},[yrLr!=null?yrLr.toFixed(1)+'%':'—']),
      el('td',{class:'td-r'},[yrTc>0?yrTc+'名':'—']),
    ].forEach(function(td){totalRow.appendChild(td);});
    tbody.appendChild(totalRow);

    tbl.appendChild(tbody);tw.appendChild(tbl);detailWrap.appendChild(tw);
    detailWrap.appendChild(closeBtn);
    sec.appendChild(detailWrap);
    app.appendChild(sec);
  });
}

// ══ ファイル読み込み ══════════════════════════════
function loadFile(file){
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var buf=e.target.result,arr=new Uint8Array(buf),text;
    if(arr[0]===0xFF&&arr[1]===0xFE)text=new TextDecoder('utf-16le').decode(buf);
    else if(arr[0]===0xFE&&arr[1]===0xFF)text=new TextDecoder('utf-16be').decode(buf);
    else text=new TextDecoder('utf-8').decode(buf);
    try{
      var newM=processCSV(text);
      if(!newM.length)return;
      var nkArr=newM.map(function(m){return m.key;});
      state.allData=state.allData.filter(function(d){return nkArr.indexOf(d.key)<0;}).concat(newM)
        .sort(function(a,b){return a.key.localeCompare(b.key);});
      var last=newM[newM.length-1];
      state.selYear=last.year;state.selKey=last.key;
      state.view='monthly';state.ctab='overview';
      saveData();render();
    }catch(ex){console.error(ex);}
  };
  reader.readAsArrayBuffer(file);
}
